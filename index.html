<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Prime Logistics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/dist/tabler-icons.min.css">
<style>
  :root{
    --ink:#0b0f12;
    --card:#171c20;
    --card-2:#1d2329;
    --amber:#f5a623;
    --line: rgba(255,255,255,0.08);
    --muted:#9aa6ac;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    background:var(--ink);
    font-family:'Inter',sans-serif;
    color:#f3f5f6;
    -webkit-font-smoothing:antialiased;
  }
  body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    background:
      radial-gradient(circle at 50% 0%, rgba(245,166,35,0.10), transparent 50%),
      var(--ink);
    padding: 48px 20px 60px;
  }

  .frame{
    width:100%;
    max-width:430px;
  }

  .logo-wrap{
    width:128px;height:128px;
    margin:0 auto 22px;
    border-radius:50%;
    background:#fff;
    display:flex;align-items:center;justify-content:center;
    padding:22px;
    border:1px solid var(--line);
  }
  .logo-wrap svg{ width:100%; height:100%; }
  .logo-wrap svg .cls-1{ fill:#9c9c9c; }
  .logo-wrap svg .cls-2, .logo-wrap svg .cls-3{ fill:#1f3329; }

  .identity{
    text-align:center;
    margin-bottom:28px;
  }
  h1.brand{
    font-family:'Archivo',sans-serif;
    font-weight:800;
    font-size:25px;
    letter-spacing:0.02em;
    margin-bottom:8px;
  }
  .brand span{ color:var(--amber); }
  .tagline{
    font-size:13.5px;
    color:var(--muted);
    line-height:1.6;
    max-width:300px;
    margin:0 auto;
  }

  .links{
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .link{
    display:flex;
    align-items:center;
    gap:16px;
    background:linear-gradient(180deg, var(--card) 0%, var(--card-2) 100%);
    border:1px solid var(--line);
    border-radius:16px;
    padding:14px 18px;
    text-decoration:none;
    color:#f3f5f6;
    transition: transform .12s ease, border-color .15s ease;
  }
  .link:active{ transform:scale(0.98); }
  .link:hover{ border-color: rgba(245,166,35,0.4); }

  .link .icn{
    flex:0 0 auto;
    width:46px;height:46px;
    border-radius:12px;
    display:flex;align-items:center;justify-content:center;
    color:#fff;
  }
  .link .icn svg{ display:block; }
  .icn.tiktok{ background:#000; }
  .icn.instagram{ background:linear-gradient(135deg,#feda75 0%,#d62976 45%,#962fbf 75%,#4f5bd5 100%); }
  .icn.facebook{ background:#1877f2; }
  .icn.website{ background:var(--amber); color:#241704; }

  .link .meta{ flex:1 1 auto; min-width:0; }
  .link .meta .t{
    font-family:'Archivo',sans-serif;
    font-weight:700;
    font-size:16px;
  }
  .link .meta .d{
    font-size:12px;
    color:var(--muted);
    margin-top:2px;
  }
  .link .go{
    color:var(--muted);
    font-size:18px;
    flex:0 0 auto;
  }

  footer{
    text-align:center;
    font-size:11px;
    color:var(--muted);
    letter-spacing:0.05em;
    margin-top:34px;
  }
</style>
</head>
